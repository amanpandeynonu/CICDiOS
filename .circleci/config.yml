
version: 2.1

jobs:
  # -----------------------------
  # 1) Build + Unit tests
  # -----------------------------
  build_and_unit_tests:
    macos:
      xcode: "15.4"   # <-- change to a valid CircleCI Xcode version
    environment:
      FL_OUTPUT_DIR: output
    steps:
      - checkout
      - run:
          name: Run Unit Tests
          command: |
            mkdir -p test_output/unit
            xcodebuild \
              -project TestCaseDemo.xcodeproj \
              -scheme TestCaseDemo \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.6' \
              -resultBundlePath test_output/unit/UnitTests.xcresult \
              test
      - store_test_results:
          path: test_output
      - store_artifacts:
          path: test_output
          destination: unit_test_results

  # -----------------------------
  # 2) UI tests on iPhone
  # -----------------------------
  ui_tests_iphone:
    macos:
      xcode: "15.4"
    environment:
      FL_OUTPUT_DIR: output
    steps:
      - checkout
      - run:
          name: Run UI Tests — iPhone
          command: |
            mkdir -p test_output/ui_iphone
            xcodebuild \
              -project TestCaseDemo.xcodeproj \
              -scheme TestCaseDemo \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.6' \
              -resultBundlePath test_output/ui_iphone/UITests_iPhone.xcresult \
              test
      - store_test_results:
          path: test_output
      - store_artifacts:
          path: test_output
          destination: ui_tests_iphone_results

  # -----------------------------
  # 3) UI tests on iPad
  # -----------------------------
  ui_tests_ipad:
    macos:
      xcode: "15.4"
    environment:
      FL_OUTPUT_DIR: output
    steps:
      - checkout
      - run:
          name: Run UI Tests — iPad
          command: |
            mkdir -p test_output/ui_ipad
            xcodebuild \
              -project TestCaseDemo.xcodeproj \
              -scheme TestCaseDemo \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPad Air 11-inch (M3),OS=18.6' \
              -resultBundlePath test_output/ui_ipad/UITests_iPad.xcresult \
              test
      - store_test_results:
          path: test_output
      - store_artifacts:
          path: test_output
          destination: ui_tests_ipad_results

  # -----------------------------
  # 4) Post-merge actions on main
  # -----------------------------
  post_merge_main:
    macos:
      xcode: "15.4"
    steps:
      - checkout
      - run:
          name: Post-merge actions (main only)
          command: |
            echo "Do your post-merge build/release/deploy steps here"
            # fastlane release
            # upload artifacts, publish, deploy, etc.

workflows:
  version: 2

  # A reusable test workflow pattern: Unit -> UI iPhone + UI iPad
  # We will repeat this job chain in multiple workflows.

  # 1) Push to any branch except main/dev/test
  on_branch_push:
    jobs:
      - build_and_unit_tests:
          filters:
            branches:
              ignore:
                - main
                - dev
                - test
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
          filters:
            branches:
              ignore:
                - main
                - dev
                - test
      - ui_tests_ipad:
          requires: [build_and_unit_tests]
          filters:
            branches:
              ignore:
                - main
                - dev
                - test

  # 2) Push to dev branch
  on_develop_push:
    jobs:
      - build_and_unit_tests:
          filters:
            branches:
              only: dev
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
          filters:
            branches:
              only: dev
      - ui_tests_ipad:
          requires: [build_and_unit_tests]
          filters:
            branches:
              only: dev

  on_test_push:
    jobs:
      - build_and_unit_tests:
          filters:
            branches:
              only: test
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
          filters:
            branches:
              only: test
      - ui_tests_ipad:
          requires: [build_and_unit_tests]
          filters:
            branches:
              only: test              

  # 2b) PR validation (covers PRs to dev AND PRs to main)
  # CircleCI runs PR pipelines on the *source branch*.
  # You cannot reliably filter by PR target branch in config.yml alone.
  on_pr_to_develop:
    jobs:
      - build_and_unit_tests
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
      - ui_tests_ipad:
          requires: [build_and_unit_tests]

  on_pr_to_test:
    jobs:
      - build_and_unit_tests
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
      - ui_tests_ipad:
          requires: [build_and_unit_tests]        

  # 3+4) “Before merge to main” is enforced by GitHub branch protection requiring these checks.
  # 4) After merge to main: run post_merge_main only on main pushes
  on_master_pre_and_post:
    jobs:
      - build_and_unit_tests
      - ui_tests_iphone:
          requires: [build_and_unit_tests]
      - ui_tests_ipad:
          requires: [build_and_unit_tests]
      - post_merge_main:
          requires: [ui_tests_iphone, ui_tests_ipad]
          filters:
            branches:
              only: main
